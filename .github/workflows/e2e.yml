name: Manual E2E Tests
on:
  workflow_dispatch:
    inputs:
      api_base:
        description: 'Target API Endpoint'
        required: true
        default: 'http://localhost:3000/api'
      branch:
        description: 'Branch to run tests from'
        required: true
        default: 'master'

jobs:
  playwright-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch }}

    - uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'
        cache-dependency-path: 'e2e/package-lock.json'

    - name: Install Bun (for backend)
      uses: oven-sh/setup-bun@v1

    - name: Clone Backend
      run: git clone https://github.com/realworld-apps/nitro-prisma-zod-realworld-example-app ../backend

    - name: Install Backend Deps
      run: cd ../backend && bun install

    - name: Install Frontend Deps
      run: cd frontend && npm install

    - name: Install E2E Deps
      run: cd e2e && npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
      working-directory: e2e

    - name: Run Playwright tests
      run: npx playwright test
      working-directory: e2e
      env:
        # Point to the freshly cloned backend
        VITE_API_BASE: http://localhost:3000/api
        BACKEND_PATH: ../../backend
        JWT_SECRET: "test-secret"

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: e2e/playwright-report/
        retention-days: 30
